services:
    postgres:
        image: postgres:15-alpine
        container_name: api_monitoring_postgres
        environment:
            POSTGRES_DB: api_monitoring_system
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
        ports:
            - "5433:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql #bind-mount
        networks:
            - api_monitoring_system
        restart: unless-stopped
        healthcheck:
            test:
                ["CMD-SHELL", "pg_isready -U postgres -d api_monitoring_system"]
            interval: 20s
            timeout: 5s
            retries: 5

    mongo:
        image: mongo:6.0
        container_name: api_monitoring_mongo
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db
        networks:
            - api_monitoring_system
        restart: unless-stopped

    rabbitmq:
        image: rabbitmq:3-management-alpine
        container_name: api_monitoring_rabbitmq
        environment:
            RABBITMQ_DEFAULT_USER: rabbitmq
            RABBITMQ_DEFAULT_PASS: password
            RABBITMQ_DEFAULT_VHOST: api_monitoring_system
        ports:
            - "5672:5672" # AMQP port
            - "15672:15672" # Management UI
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        networks:
            - api_monitoring_system
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 30s
            timeout: 10s
            retries: 5

    # pgAdmin (PostgreSQL web UI)
    pgadmin:
        image: dpage/pgadmin4:7
        container_name: api-monitoring-pgadmin
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@example.com
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - "5050:80"
        volumes:
            - pgadmin_data:/var/lib/pgadmin
        networks:
            - api_monitoring_system
        restart: unless-stopped
        depends_on:
            - postgres

    api-app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: api-monitoring-app
        environment:
            NODE_ENV: production
            PORT: 5000
            # MongoDB (local container)
            MONGO_URI: mongodb://mongo:27017/api_monitoring
            MONGO_DB_NAME: api_monitoring
            # PostgreSQL (Docker container)
            PG_HOST: postgres
            PG_PORT: 5432
            PG_DATABASE: api_monitoring_system
            PG_USER: postgres
            PG_PASSWORD: password
            # RabbitMQ (Docker container)
            RABBITMQ_URL: amqp://rabbitmq:password@rabbitmq:5672/api_monitoring_system
            RABBITMQ_QUEUE: api_hits
            # Security
            JWT_SECRET: ${JWT_SECRET}
            JWT_EXPIRES_IN: 24h
            # Rate Limiting
            RATE_LIMIT_WINDOW_MS: 60000
            RATE_LIMIT_MAX_REQUESTS: 100
        ports:
            - "5000:5000"
        volumes:
            - ./logs:/app/logs
        networks:
            - api_monitoring_system
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
            interval: 30s
            timeout: 10s
            retries: 3

volumes:
    postgres_data:
        driver: local
    rabbitmq_data:
        driver: local
    mongo_data:
        driver: local
    pgadmin_data:
        driver: local

networks:
    api_monitoring_system:
        driver: bridge
