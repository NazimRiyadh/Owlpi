services:
  postgres:
    image: postgres:15-alpine
    container_name: api_monitoring_postgres
    environment:
      POSTGRES_DB: api_monitoring_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql #bind-mount
    networks:
      - api_monitoring_system
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_monitoring_system"]
      interval: 20s
      timeout: 5s
      retries: 5
  
  mongo:
    image: mongo:6.0
    container_name: api_monitoring_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - api_monitoring_system
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: api_monitoring_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: password
      RABBITMQ_DEFAULT_VHOST: api_monitoring_system
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - api_monitoring_system
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
  
  # pgAdmin (PostgreSQL web UI)
  pgadmin:
    image: dpage/pgadmin4:7
    container_name: api-monitoring-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - api_monitoring_system
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  mongo_data:
    driver: local
  pgadmin_data:
    driver: local
  
networks:
  api_monitoring_system:
    driver: bridge